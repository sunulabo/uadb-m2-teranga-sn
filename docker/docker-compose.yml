version: '3.8'

# Teranga-SN — Infrastructure Big Data complète
# Eq.12 | Master 2 DSGL UADB 2025-2026

networks:
  teranga-net:
    driver: bridge

volumes:
  zookeeper-data:
  kafka-data:
  hbase-data:
  hive-data:
  airflow-logs:

services:

  # ── Zookeeper ────────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: teranga-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper
    networks:
      - teranga-net
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka ─────────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: teranga-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 72
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - teranga-net
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── NiFi ──────────────────────────────────────────────────────────────────────
  nifi:
    image: apache/nifi:1.23.2
    container_name: teranga-nifi
    ports:
      - "8081:8081"
    environment:
      NIFI_WEB_HTTP_PORT: 8081
      NIFI_WEB_HTTPS_PORT: ""
      SINGLE_USER_CREDENTIALS_USERNAME: admin
      SINGLE_USER_CREDENTIALS_PASSWORD: teranga2025!
    volumes:
      - ../nifi_templates:/opt/nifi/nifi-current/conf/templates
    networks:
      - teranga-net

  # ── HBase ─────────────────────────────────────────────────────────────────────
  hbase:
    image: harisekhon/hbase:2.1
    container_name: teranga-hbase
    ports:
      - "16000:16000"
      - "16010:16010"
      - "16020:16020"
      - "9090:9090"
    environment:
      HBASE_CONF_hbase_cluster_distributed: "false"
    volumes:
      - hbase-data:/hbase-data
    networks:
      - teranga-net
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9090"]
      interval: 30s
      timeout: 20s
      retries: 5

  # ── Hive Metastore ────────────────────────────────────────────────────────────
  hive-metastore:
    image: apache/hive:3.1.3
    container_name: teranga-hive
    ports:
      - "10000:10000"
      - "10002:10002"
    environment:
      SERVICE_NAME: hiveserver2
    volumes:
      - hive-data:/opt/hive/data
    networks:
      - teranga-net

  # Spark Master
  spark-master:
    image: apache/spark:latest
    container_name: teranga-spark-master
    ports:
      - "8080:8080"
      - "7077:7077"
    environment:
      SPARK_NO_DAEMONIZE: "true"
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    networks:
      - teranga-net

  # Spark Worker
  spark-worker:
    image: apache/spark:latest
    container_name: teranga-spark-worker
    depends_on:
      - spark-master
    environment:
      SPARK_NO_DAEMONIZE: "true"
      SPARK_WORKER_MEMORY: "2g"
      SPARK_WORKER_CORES: "2"
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    networks:
      - teranga-net

  # ── Airflow ───────────────────────────────────────────────────────────────────
  airflow:
    image: apache/airflow:2.7.3
    container_name: teranga-airflow
    ports:
      - "8082:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: teranga_secret_key_2025
      TERANGA_SECRET_SALT: ${TERANGA_SECRET_SALT:-teranga_salt_uadb_2025}
    volumes:
      - ../dags:/opt/airflow/dags
      - ../models:/opt/models
      - airflow-logs:/opt/airflow/logs
    command: >
      bash -c "airflow db init &&
               airflow users create --username admin --password admin
               --firstname Admin --lastname Teranga
               --role Admin --email admin@teranga.sn &&
               airflow webserver & airflow scheduler"
    networks:
      - teranga-net
